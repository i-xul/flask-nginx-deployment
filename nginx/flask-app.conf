server {
    listen 80;
    server_name example.com;

    location / {
        include uwsgi_params;
        uwsgi_pass unix:/run/flask-app.sock;
    }

    location /health {
        include uwsgi_params;
        uwsgi_pass unix:/run/flask-app.sock;
    }

    access_log /var/log/nginx/flask-app-access.log;
    error_log /var/log/nginx/flask-app-error.log;
}
